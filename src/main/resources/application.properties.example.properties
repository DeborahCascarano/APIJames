# Nome da aplicação
spring.application.name=api

# Configuração do Console H2 (Acesse: localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:apidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=[ADICIONAR O USUARIO DO BANCO DE DADOS]
spring.datasource.password=[ADICIONAR A SENHA]

# Exibir os comandos SQL no console do IntelliJ
spring.jpa.show-sql=true

## Formato padrão para serialização de datas
#spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
